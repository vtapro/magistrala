---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: magistrala-redis
  namespace: magistrala
spec:
  serviceName: magistrala-redis
  replicas: 1
  selector:
    matchLabels:
      app: magistrala-redis
  template:
    metadata:
      labels:
        app: magistrala-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - redis-server
            - "--requirepass"
            - "$(REDIS_PASSWORD)"
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: magistrala-redis-secret
                  key: redis-password
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "300m"
          volumeMounts:
            - name: redis-data
              mountPath: /data
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: longhorn
        resources:
          requests:
            storage: 2Gi

---
apiVersion: v1
kind: Service
metadata:
  name: magistrala-redis
  namespace: magistrala
spec:
  selector:
    app: magistrala-redis
  ports:
    - port: 6379
      targetPort: 6379
  clusterIP: None
