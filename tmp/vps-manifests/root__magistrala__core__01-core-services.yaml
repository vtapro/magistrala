---
# ============================================================
# USERS SERVICE
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: magistrala-users
  namespace: magistrala
spec:
  replicas: 2
  selector:
    matchLabels:
      app: magistrala-users
  template:
    metadata:
      labels:
        app: magistrala-users
    spec:
      containers:
        - name: users
          image: magistrala/users:latest
          env:
            - name: MG_USERS_LOG_LEVEL
              value: "info"
            - name: MG_USERS_HTTP_HOST
              value: "0.0.0.0"
            - name: MG_USERS_HTTP_PORT
              value: "9002"
            - name: MG_USERS_GRPC_HOST
              value: "0.0.0.0"
            - name: MG_USERS_GRPC_PORT
              value: "7002"
            - name: MG_USERS_DB_HOST
              value: "magistrala-postgres"
            - name: MG_USERS_DB_PORT
              value: "5432"
            - name: MG_USERS_DB_USER
              value: "mg_users"
            - name: MG_USERS_DB_PASS
              valueFrom:
                secretKeyRef:
                  name: magistrala-secrets
                  key: pg-users-password
            - name: MG_USERS_DB_NAME
              value: "mg_users"
            - name: MG_USERS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: magistrala-secrets
                  key: secret-key
            - name: MG_USERS_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: magistrala-secrets
                  key: admin-email
            - name: MG_USERS_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: magistrala-secrets
                  key: admin-password
            - name: MG_NATS_URL
              value: "nats://magistrala-nats:4222"
            - name: MG_AUTH_GRPC_URL
              value: "magistrala-auth:7001"
          ports:
            - containerPort: 9002
              name: http
            - containerPort: 7002
              name: grpc
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          livenessProbe:
            httpGet:
              path: /health
              port: 9002
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 9002
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: magistrala-users
  namespace: magistrala
spec:
  selector:
    app: magistrala-users
  ports:
    - name: http
      port: 9002
      targetPort: 9002
    - name: grpc
      port: 7002
      targetPort: 7002

