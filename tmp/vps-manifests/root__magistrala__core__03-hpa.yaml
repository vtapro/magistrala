---
# ============================================================
# HORIZONTAL POD AUTOSCALER - Tự động scale khi tải cao
# ============================================================

# HPA cho Users service
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: magistrala-users-hpa
  namespace: magistrala
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: magistrala-users
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

